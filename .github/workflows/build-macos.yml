name: Build macOS

on:
  workflow_dispatch:
  push:
    branches:
      - codex/mac-build

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            label: Apple Silicon
            runner: macos-15
          - arch: x64
            label: Intel
            runner: macos-15-intel
    runs-on: ${{ matrix.runner }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate source
        run: |
          npm run typecheck
          npm run test

      - name: Build web application
        run: npm run build

      - name: Package DMG
        run: npx electron-builder --mac dmg --${{ matrix.arch }} --publish never

      - name: Verify macOS package
        run: |
          APP_PATH="$(find release -maxdepth 2 -name 'Image-Shift.app' -print -quit)"
          test -n "$APP_PATH"
          codesign --verify --deep --strict "$APP_PATH"
          file "$APP_PATH/Contents/MacOS/Image-Shift"
          ONNX_ROOT="$APP_PATH/Contents/Resources/app.asar.unpacked/node_modules/onnxruntime-node/bin/napi-v3"
          test -f "$ONNX_ROOT/darwin/${{ matrix.arch }}/onnxruntime_binding.node"
          test "$(find "$ONNX_ROOT" -name onnxruntime_binding.node | wc -l | tr -d ' ')" = "1"
          hdiutil verify release/*.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Image-Shift-macOS-${{ matrix.arch }}
          path: release/*.dmg
          if-no-files-found: error
          retention-days: 14
